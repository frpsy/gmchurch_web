<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대한성공회 광명교회</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container"><h1 class="logo" id="church-name"></h1></div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h2 id="main-slogan"></h2>
                <p id="sub-slogan"></p>
            </div>
        </section>

        <section class="live-banner">
            <div class="container">
                <h3 style="margin-bottom:1rem;">실시간 온라인 예배</h3>
                <a href="#" id="live-link" target="_blank" class="btn-live">라이브 참여하기</a>
            </div>
        </section>

        <section class="section container">
            <div class="grid">
                <div class="card">
                    <h3>예배 안내</h3>
                    <ul id="worship-list"></ul>
                </div>
                <div class="card">
                    <h3>오시는 길</h3>
                    <p id="church-address"></p>
                </div>
            </div>
        </section>
    </main>

    <footer id="footer-contact"></footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
