<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>대한성공회 광명교회</title>
    <meta name="description" content="녹색 교회, 모든 생명을 환대하는 교회. 대한성공회 광명교회 성 디모테오 성당.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preload" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css" as="style">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="main-nav" class="nav-header"></nav>

    <header class="hero">
        <div class="hero-fallback"></div>
        <div class="hero-overlay"></div>
        <div class="container hero-content">
            <div class="hero-label">대한성공회 · 서울교구 서부교무구</div>
            <h1 id="hero-title"></h1>
            <p class="hero-sub" id="hero-sub"></p>
            <div class="hero-actions">
                <a href="clergy.html" class="btn-outline">교회 소개</a>
                <a href="worship.html" class="btn-outline">예배 안내</a>
                <a href="visit.html" class="btn-outline">오시는 길</a>
            </div>
        </div>
    </header>

    <!-- 교회 소개 (간략) -->
    <section class="section" id="about-brief">
        <div class="container">
            <div class="section-header">
                <p class="section-eyebrow">About</p>
                <h2 class="section-title">광명교회</h2>
            </div>
            <div id="about-brief-content"></div>
        </div>
    </section>

    <!-- 예배 -->
    <section class="section" id="worship" style="background:var(--white);">
        <div class="container">
            <div class="section-header">
                <p class="section-eyebrow">Worship</p>
                <h2 class="section-title">예배 안내</h2>
                <p class="section-sub">성공회 전례 안에서 드리는 깊고 풍성한 예배에 초대합니다.</p>
            </div>
            <div id="worship-grid" class="grid"></div>
            <div class="guide-banner" id="worship-guide"></div>
        </div>
    </section>

    <!-- 오시는 길 -->
    <section class="section" id="visit-preview">
        <div class="container">
            <div class="section-header">
                <p class="section-eyebrow">Visit</p>
                <h2 class="section-title">오시는 길</h2>
                <p class="section-sub">광명교회로 초대합니다. 누구나 환영합니다.</p>
            </div>
            <div class="info-card" id="location-card" style="max-width:760px; margin:0 auto;"></div>
        </div>
    </section>

    <!-- 헌금 -->
    <section class="section" id="giving" style="background:var(--white);">
        <div class="container">
            <div class="section-header">
                <p class="section-eyebrow">Giving</p>
                <h2 class="section-title">헌금</h2>
                <p class="section-sub">투명하게 운영되는 교회 살림과 봉헌 안내입니다.</p>
            </div>
            <div class="info-card" id="bank-info" style="max-width:560px; margin:0 auto;"></div>
        </div>
    </section>

    <footer id="main-footer"></footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
