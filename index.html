<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>대한성공회 광명교회</title>
    <meta name="description" content="녹색 교회, 모든 생명을 환대하는 교회. 대한성공회 광명교회 성 디모테오 성당.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="main-nav" class="nav-header"></nav>

    <header class="hero">
        <!--
            YouTube 배경 영상
            영상: "4K Forest" (Relaxing White Noise) — youtube.com/watch?v=1t7g690boao
            파라미터:
              autoplay=1        자동재생
              mute=1            음소거 (autoplay 필수 조건)
              loop=1            반복
              playlist=VIDEO_ID loop 작동에 필요
              controls=0        컨트롤 숨김
              disablekb=1       키보드 입력 차단
              modestbranding=1  유튜브 로고 최소화
              rel=0             관련 영상 숨김
              enablejsapi=1     JS API 활성화
            포인터 이벤트 차단 + z-index 구조로 클릭 통과 불가 처리
        -->
        <div class="hero-video-wrap">
            <iframe
                class="hero-yt"
                src="https://www.youtube.com/embed/1t7g690boao?autoplay=1&mute=1&loop=1&playlist=1t7g690boao&controls=0&disablekb=1&rel=0&enablejsapi=1&iv_load_policy=3&start=10&playsinline=1"
                allow="autoplay; encrypted-media"
                allowfullscreen
                title="배경 영상"
                aria-hidden="true"
                tabindex="-1"
                frameborder="0"
            ></iframe>
        </div>
        <!-- 정적 fallback: 모바일 / 저전력 / iframe 차단 환경 -->
        <div class="hero-fallback"></div>
        <div class="hero-overlay"></div>
        <div class="container hero-content">
            <div class="hero-label">대한성공회 · 서울교구 서부교무구</div>
            <h1 id="hero-title"></h1>
            <p class="hero-sub" id="hero-sub"></p>
            <div class="hero-actions">
                <a href="#" id="live-btn" class="btn-live">● 실시간 예배 참여</a>
                <a href="worship.html" class="btn-outline">예배 안내 보기</a>
            </div>
        </div>
    </header>

    <!-- 예배 -->
    <section class="section" id="worship">
        <div class="container">
            <div class="section-header">
                <p class="section-eyebrow">Worship</p>
                <h2 class="section-title">예배 안내</h2>
                <p class="section-sub">성공회 전례 안에서 드리는 깊고 풍성한 예배에 초대합니다.</p>
            </div>
            <div id="worship-grid" class="grid"></div>
            <div class="guide-banner" id="worship-guide"></div>
        </div>
    </section>

    <!-- 공동체 -->
    <section class="section" id="community" style="background:var(--white);">
        <div class="container">
            <div class="section-header">
                <p class="section-eyebrow">Community</p>
                <h2 class="section-title">함께하는 공동체</h2>
                <p class="section-sub">믿음 안에서 삶을 나누는 소공동체가 열려 있습니다.</p>
            </div>
            <div id="community-grid" class="grid"></div>
        </div>
    </section>

    <!-- 헌금과 살림 -->
    <section class="section" id="giving">
        <div class="container">
            <div class="section-header">
                <p class="section-eyebrow">Giving</p>
                <h2 class="section-title">헌금과 살림</h2>
                <p class="section-sub">투명하게 운영되는 교회 살림과 봉헌 안내입니다.</p>
            </div>
            <div class="grid">
                <div class="info-card" id="bank-info"></div>
                <div class="info-card" id="location-card"></div>
            </div>
        </div>
    </section>

    <footer id="main-footer"></footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
