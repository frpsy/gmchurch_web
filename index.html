<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대한성공회 광명교회</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero">
        <div class="container">
            <h1 id="hero-title"></h1>
            <p id="hero-sub"></p>
            <a href="#live" id="live-btn" class="btn-live">실시간 예배 참여하기</a>
        </div>
    </header>

    <section class="section container" id="worship">
        <h2 class="section-title">예배 안내 (Worship)</h2>
        <div id="worship-grid" class="grid"></div>
    </section>

    <section class="section container" id="community">
        <h2 class="section-title">함께하는 공동체 (Community)</h2>
        <div id="community-grid" class="grid"></div>
    </section>

    <section class="section container" id="giving">
        <h2 class="section-title">헌금과 살림 (Giving)</h2>
        <div class="grid">
            <div class="card" id="bank-info"></div>
            <div class="card">
                <h3>오시는 길</h3>
                <p>성 디모테오 성당: 경기도 광명시 아방리 2길 10</p>
                <div style="margin-top:1rem;">
                    <a href="https://map.kakao.com" target="_blank" style="color:var(--primary-green); font-weight:bold;">[카카오지도 보기]</a>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-links">
                <a href="#">유튜브</a>
                <a href="#">인스타그램</a>
                <a href="https://seoul.anglican.kr/">성공회 서울교구</a>
            </div>
            <p id="footer-addr"></p>
            <p id="footer-info"></p>
            <p style="margin-top:2rem; opacity:0.5;">&copy; 2026 대한성공회 광명교회. All rights reserved.</p>
        </div>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
