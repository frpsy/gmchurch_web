<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>교회 소개 — 대한성공회 광명교회</title>
    <meta name="description" content="성공회와 대한성공회 소개, 광명교회 사제, 교회 철학, 언론 보도.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="main-nav" class="nav-header"></nav>

    <div class="page-hero">
        <h1>교회 소개</h1>
        <p>성공회가 처음이신가요? 광명교회가 걸어가는 길을 함께 살펴보세요.</p>
    </div>

    <!-- 성공회 첫 방문자 안내 배너 -->
    <div id="anglican-welcome-banner"></div>

    <!-- 성공회란? -->
    <section class="section" id="what-is-anglican">
        <div class="container">
            <div id="anglican-what"></div>
        </div>
    </section>

    <!-- 대한성공회 -->
    <section class="section" style="background:var(--white);" id="ack">
        <div class="container">
            <div id="anglican-korea"></div>
        </div>
    </section>

    <!-- 함께 섬기는 사제 -->
    <section class="section" id="priest-section">
        <div class="container">
            <div class="section-header">
                <p class="section-eyebrow">Clergy</p>
                <h2 class="section-title">함께 섬기는 사제</h2>
                <p class="section-sub">광명교회를 섬기는 사제들을 소개합니다.</p>
            </div>
            <div id="clergy-full"></div>
        </div>
    </section>

    <!-- 우리가 지향하는 교회 -->
    <section class="section" style="background:var(--white);" id="philosophy">
        <div class="container">
            <div class="section-header">
                <p class="section-eyebrow">Our Vision</p>
                <h2 class="section-title">우리가 지향하는 교회</h2>
                <p class="section-sub">예수님이 말씀하신 정의, 평등, 생명을 실천하는 공동체입니다.</p>
            </div>
            <div id="philosophy-full"></div>
        </div>
    </section>

    <!-- 언론 보도 -->
    <section class="section" id="press">
        <div class="container">
            <div class="section-header">
                <p class="section-eyebrow">Press</p>
                <h2 class="section-title">언론 보도</h2>
                <p class="section-sub">민숙희(마가렛) 사제 관련 주요 보도입니다.</p>
            </div>
            <div id="press-table"></div>
        </div>
    </section>

    <footer id="main-footer"></footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
